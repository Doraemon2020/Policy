    "[]♻️ 自动选择",
    "[]🇭🇰 香港",
    "[]🇹🇼 台湾",
    "[]🇸🇬 星国",
    "[]🇯🇵 日本",
    "[]🇺🇸 美国",
    "[]⚡ 全部节点",
    "[]📌 全部节点",
    "[]DIRECT"
]

[[custom_groups]]
