# ================= 基礎節點篩選 =================

[[custom_groups]]
name = "♻️ 自动选择"
type = "url-test"
url = "http://www.gstatic.com/generate_204"
interval = 60
rule = [".*"]

[[custom_groups]]
name = "🇭🇰 香港"
type = "url-test"
url = "http://www.gstatic.com/generate_204"
interval = 600
rule = ["(HK|香港|HongKong)"]

[[custom_groups]]
name = "🇹🇼 台湾"
type = "url-test"
url = "http://www.gstatic.com/generate_204"
interval = 600
rule = ["(TW|台湾|Taiwan)"]

[[custom_groups]]
name = "🇸🇬 星国"
type = "url-test"
url = "http://www.gstatic.com/generate_204"
interval = 600
rule = ["(SG|新加坡|Singapore)"]

[[custom_groups]]
name = "🇺🇸 美国"
type = "url-test"
url = "http://www.gstatic.com/generate_204"
interval = 600
rule = ["(US|美国|United States)"]

[[custom_groups]]
name = "🇯🇵 日本"
type = "url-test"
url = "http://www.gstatic.com/generate_204"
interval = 600
rule = ["(JP|日本|Japan)"]

[[custom_groups]]
name = "⚡ 全部节点"
type = "url-test"
url = "http://www.gstatic.com/generate_204"
interval = 600
rule = ["^((?!中国|回国|游戏|限速|结算|流量).)*$"]

[[custom_groups]]
name = "📌 全部节点"
type = "select"
rule = ["^((?!中国|回国|游戏|限速|结算|流量).)*$"]

